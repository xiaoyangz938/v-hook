services:
  - type: web
    name: v-hook
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VHOOK_ENABLE_PUBLIC_UPLOADS
        value: false
