services:
  - type: web
    name: v-hook
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VHOOK_RUNTIME_ROOT
        value: /var/data/v-hook
      - key: VHOOK_ENABLE_PUBLIC_UPLOADS
        value: false
    disks:
      - name: v-hook-data
        mountPath: /var/data/v-hook
        sizeGB: 5
